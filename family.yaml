# dashboards/family.yaml
# Scene-first dashboard for wall tablets (kiosk mode).
# Requires HACS + the "Mushroom" frontend repository.
# Add via Settings > Dashboards > (new dashboard, YAML mode) and paste, or
# point a YAML-mode dashboard at this file.

title: Home
views:
  - title: Home
    icon: mdi:home
    cards:
      - type: custom:mushroom-title-card
        title: Welcome

      # ---------- Moments (party buttons) ----------
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Party
            icon: mdi:party-popper
            icon_color: amber
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.party_entertaining }
          - type: custom:mushroom-template-card
            primary: All Off
            icon: mdi:power
            icon_color: red
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.entertaining_off }

      # ---------- Living Room ----------
      - type: custom:mushroom-title-card
        subtitle: Living Room
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Bright
            icon: mdi:white-balance-sunny
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.living_bright }
          - type: custom:mushroom-template-card
            primary: Relax
            icon: mdi:weather-night
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.living_relax }
          - type: custom:mushroom-light-card
            entity: light.living_room_main_lights
            show_brightness_control: true

      # ---------- Pub ----------
      - type: custom:mushroom-title-card
        subtitle: Pub
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Bright
            icon: mdi:white-balance-sunny
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.pub_bright }
          - type: custom:mushroom-template-card
            primary: Relax
            icon: mdi:weather-night
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.pub_relax }
          - type: custom:mushroom-light-card
            entity: light.pub_main_lights
            show_brightness_control: true

      # ---------- Patio ----------
      - type: custom:mushroom-title-card
        subtitle: Patio
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: On
            icon: mdi:string-lights
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.patio_on }
          - type: custom:mushroom-template-card
            primary: Ambiance
            icon: mdi:string-lights
            tap_action:
              action: call-service
              service: scene.turn_on
              target: { entity_id: scene.patio_ambiance }
          - type: custom:mushroom-entity-card
            entity: switch.exterior_back_porch_lights
            name: Patio Light

      # ---------- Garden (TODO once Meross plug is in HA) ----------
      # - type: custom:mushroom-title-card
      #   subtitle: Garden
